name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nvim-version: ["stable", "nightly"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhymond/setup-neovim@v1
        with:
          neovim-version: ${{ matrix.nvim-version }}

      - name: Check Neovim version
        run: nvim --version

      - name: Run tests
        run: |
          nvim --headless \
            -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/ {minimal_init = 'tests/minimal_init.lua'}" \
            -c "qa!"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhymond/setup-neovim@v1
        with:
          neovim-version: stable

      - name: Check Lua syntax
        run: |
          for f in lua/**/*.lua tests/**/*.lua; do
            echo "Checking $f"
            nvim --headless -c "luafile $f" -c "qa!" 2>/dev/null || exit 1
          done
          echo "All files OK"
